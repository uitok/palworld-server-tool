web:
  password: ""
  port: 8080
  tls: false
  cert_path: ""
  key_path: ""
  public_url: ""
task:
  sync_interval: 60
  player_logging: false
  player_login_message: "Player {username} has joined the server! Current online player count: {online_num}."
  player_logout_message: "Player {username} has left the server! Current online player count: {online_num}."
rcon:
  address: "127.0.0.1:25575"
  password: ""
  use_base64: false
  timeout: 5
rest:
  address: "http://127.0.0.1:8212"
  username: "admin"
  password: ""
  timeout: 5
save:
  path: "/path/to/your/Pal/Saved"
  decode_path: ""
  sync_interval: 120
  backup_interval: 14400
  backup_keep_days: 7
# PalDefender REST API 配置（用于面板内实时发物品 / 发帕鲁 / 发蛋 / 发模板）
paldefender:
  enabled: false
  address: "http://127.0.0.1:17993"
  auth_key: ""
  timeout: 5
  presets:
    - name: starter_pack
      description: "新玩家开荒礼包"
      grant:
        exp: 5000
        lifmunks: 5
        technology_points: 3
        items:
          - item_id: PalSphere
            amount: 20
          - item_id: AncientCivilizationParts
            amount: 10
        pals:
          - pal_id: Lamball
            level: 5
            amount: 1
        pal_eggs:
          - item_id: PalEgg_Normal_01
            pal_id: Lamball
            level: 1
            amount: 1
        pal_templates:
          - template_name: starter_worker
            amount: 1
manage:
  kick_non_whitelist: false
